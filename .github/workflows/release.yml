name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install

      - name: Build Tauri App
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      # ==============================================
      # 🔥 核心：自动生成 latest.json（真正全自动）
      # ==============================================
      - name: Generate latest.json
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/v', ''
          $repo = $env:GITHUB_REPOSITORY
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -ExpandProperty Name
          $sig = Get-Content "src-tauri/target/release/bundle/nsis/$exe.sig" -Raw
          $sig = $sig.Trim()

          @"
          {
            "version": "$tag",
            "notes": "自动更新",
            "pub_date": "$(Get-Date -Format 'o')",
            "platforms": {
              "windows-x86_64": {
                "url": "https://ghproxy.net/https://github.com/$repo/releases/download/v$tag/$exe",
                "signature": "$sig"
              }
            }
          }
          "@ | Out-File -FilePath latest.json -Encoding utf8

      # ==============================================
      # 自动上传到 Release
      # ==============================================
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json